server:
  port: 8080

spring:
  application:
    name: mango-gateway-app
  cloud:
    discovery:
      enabled: false
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    gateway:
      routes:
        - id: mango-captcha-public
          uri: http://localhost:8081
          predicates:
            - Path=/captcha/**
          metadata:
            apiAccessMode: PUBLIC
        - id: mango-platform-app
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**,/identity/**,/authorization/**,/org/**,/system/**,/ai/**
        - id: mango-business-app
          uri: http://localhost:8082
          predicates:
            - Path=/biz/**,/business/**

mango:
  authorization:
    access:
      auth-enabled: true
    resource-sync:
      gateway:
        enabled: true
        module-name: gateway
        mode: read
  module:
    module-service:
      modules:
        mango-resource:
          service-name: mango-platform-app
  security:
    jwt:
      secret: ${JWT_SECRET:mango-secret-key-change-in-production-must-be-at-least-32-chars}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    io.mango: INFO
