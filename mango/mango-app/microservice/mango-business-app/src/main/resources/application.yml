server:
  port: 8082

spring:
  application:
    name: mango-business-app
  datasource:
    url: jdbc:h2:mem:mango_business;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    banner: false
    db-config:
      id-type: auto

mango:
  gateway:
    auth-enabled: true
  security:
    jwt:
      secret: ${JWT_SECRET:mango-secret-key-change-in-production-must-be-at-least-32-chars}
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    io.mango: INFO
