server:
  port: 5555

spring:
  application:
    name: mango-monolith-app
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mango?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  h2:
    console:
      enabled: false
      path: /h2-console

  # SQL init disabled - schema created by MyBatis-Plus
  sql:
    init:
      mode: never

# MyBatis-Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    banner: false
    db-config:
      id-type: auto

# Mango JWT
mango:
  security:
    jwt:
      secret: ${JWT_SECRET:mango-secret-key-for-jwt-token-generation-must-be-at-least-256-bits}
  auth:
    security:
      permit-paths:
        - /error
        - /swagger-ui.html
        - /swagger-ui/**
        - /doc.html
        - /webjars/**
        - /favicon.ico
        - /v3/api-docs
        - /v3/api-docs/**
  crypto:
    sm4-key: MFkwEwYHKoZIzj0CAQYIKoEcz1UBgi0DQgA=
    sm4-iv:
  kv:
    store:
      type: memory
  ip-location:
    enabled: true
    provider: ip2region
    fail-fast: false
    cache:
      enabled: true
      maximum-size: 10000
      ttl: 24h
    ip2region:
      xdb-location: file:./config/ip-location/ip2region_v4.xdb
      vector-index-enabled: true
      content-cache-enabled: false
  captcha:
    required-paths: []
  authorization:
    resource-sync:
      resources:
        - module-name: mango-infra-doc
          http-method: GET
          path-pattern: /swagger-ui.html
          access-mode: PUBLIC
          description: Swagger UI entry
        - module-name: mango-infra-doc
          http-method: GET
          path-pattern: /swagger-ui/**
          access-mode: PUBLIC
          description: Swagger UI assets
        - module-name: mango-infra-doc
          http-method: GET
          path-pattern: /doc.html
          access-mode: PUBLIC
          description: Knife4j document entry
        - module-name: mango-infra-doc
          http-method: GET
          path-pattern: /webjars/**
          access-mode: PUBLIC
          description: Knife4j and Swagger static assets
        - module-name: mango-infra-doc
          http-method: GET
          path-pattern: /favicon.ico
          access-mode: PUBLIC
          description: Document favicon
        - module-name: mango-infra-doc
          http-method: GET
          path-pattern: /v3/api-docs
          access-mode: PUBLIC
          description: OpenAPI document
        - module-name: mango-infra-doc
          http-method: GET
          path-pattern: /v3/api-docs/**
          access-mode: PUBLIC
          description: OpenAPI grouped documents
  doc:
    module-grouping:
      include-default-group: false
      include-scope-tags: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    io.mango: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.mybatis: DEBUG

# OpenAPI Documentation
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: mango-auth
        url: /v3/api-docs/mango-auth
      - name: mango-authorization
        url: /v3/api-docs/mango-authorization
      - name: mango-captcha
        url: /v3/api-docs/mango-captcha
      - name: mango-identity
        url: /v3/api-docs/mango-identity
      - name: mango-org
        url: /v3/api-docs/mango-org
      - name: mango-system
        url: /v3/api-docs/mango-system
      - name: mango-biz-notification
        url: /v3/api-docs/mango-biz-notification
      - name: mango-guarantee
        url: /v3/api-docs/mango-guarantee
      - name: mango-infra-realtime
        url: /v3/api-docs/mango-infra-realtime
  api-docs:
    enabled: true
    path: /v3/api-docs
  packages-to-scan: io.mango
