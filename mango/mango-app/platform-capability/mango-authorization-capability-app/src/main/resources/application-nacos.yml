spring:
  cloud:
    discovery:
      enabled: true
    service-registry:
      auto-registration:
        enabled: true
    nacos:
      discovery:
        enabled: true
        register-enabled: true
        server-addr: ${MANGO_NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        enabled: ${MANGO_NACOS_CONFIG_ENABLED:false}
        server-addr: ${MANGO_NACOS_SERVER_ADDR:127.0.0.1:8848}

mango:
  internal-call:
    secret: ${MANGO_INTERNAL_CALL_SECRET:}
  web:
    inner:
      secret: ${MANGO_INTERNAL_CALL_SECRET:}
