mango:
  crypto:
    # Crypto module enabled flag - set to false for plaintext passthrough (降级策略)
    enabled: true

    # SM4 symmetric key (国密对称密钥) - REQUIRED when enabled=true
    # MUST be set via environment variable, never hardcode
    sm4-key: ${CRYPTO_SM4_KEY:}

    # SM4 IV (optional, will generate random if not provided)
    sm4-iv: ${CRYPTO_SM4_IV:}

    # AES symmetric key - REQUIRED when enabled=true
    aes-key: ${CRYPTO_AES_KEY:}

    # AES IV (optional, will generate random if not provided)
    aes-iv: ${CRYPTO_AES_IV:}

    # HMAC-SM3 key
    hmac-sm3-key: ${CRYPTO_HMAC_SM3_KEY:}

    # SM2 key pair (for signing/encryption)
    sm2-public-key: ${CRYPTO_SM2_PUBLIC_KEY:}
    sm2-private-key: ${CRYPTO_SM2_PRIVATE_KEY:}

    # RSA key pair (for signing/encryption)
    rsa-public-key: ${CRYPTO_RSA_PUBLIC_KEY:}
    rsa-private-key: ${CRYPTO_RSA_PRIVATE_KEY:}
