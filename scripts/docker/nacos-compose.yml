services:
  mango-nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: mango-baseline-nacos
    platform: linux/amd64
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
