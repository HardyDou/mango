services:
  powerjob-mysql:
    image: mysql:8.4
    container_name: mango-powerjob-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${POWERJOB_MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${POWERJOB_DB_NAME:-mango_job}
      MYSQL_USER: ${POWERJOB_DB_USERNAME:-powerjob}
      MYSQL_PASSWORD: ${POWERJOB_DB_PASSWORD:-powerjob}
    ports:
      - "${POWERJOB_MYSQL_PORT:-33306}:3306"
    volumes:
      - powerjob-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  powerjob-server:
    image: ${POWERJOB_SERVER_IMAGE:-powerjob/powerjob-server:${POWERJOB_VERSION:-v5.1.2}}
    platform: ${POWERJOB_SERVER_PLATFORM:-linux/amd64}
    container_name: mango-powerjob-server
    depends_on:
      powerjob-mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      JVMOPTIONS: >-
        ${POWERJOB_JVM_OPTIONS:--Xms256m -Xmx512m}
        -Dpowerjob.network.external.address=${POWERJOB_EXTERNAL_ADDRESS:-127.0.0.1}
        -Dpowerjob.network.external.port.http=${POWERJOB_EXTERNAL_HTTP_PORT:-10010}
        -Dpowerjob.network.external.port.akka=${POWERJOB_EXTERNAL_AKKA_PORT:-10086}
        -Dpowerjob.network.external.port.mu=${POWERJOB_EXTERNAL_MU_PORT:-10077}
      PARAMS: >-
        --spring.profiles.active=product
        --spring.datasource.core.driver-class-name=com.mysql.cj.jdbc.Driver
        --spring.datasource.core.jdbc-url=jdbc:mysql://powerjob-mysql:3306/${POWERJOB_DB_NAME:-mango_job}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
        --spring.datasource.core.username=${POWERJOB_DB_USERNAME:-powerjob}
        --spring.datasource.core.password=${POWERJOB_DB_PASSWORD:-powerjob}
        --oms.storage.dfs.mysql_series.driver=com.mysql.cj.jdbc.Driver
        --oms.storage.dfs.mysql_series.url=jdbc:mysql://powerjob-mysql:3306/${POWERJOB_DB_NAME:-mango_job}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
        --oms.storage.dfs.mysql_series.username=${POWERJOB_DB_USERNAME:-powerjob}
        --oms.storage.dfs.mysql_series.password=${POWERJOB_DB_PASSWORD:-powerjob}
        --oms.storage.dfs.mysql_series.auto_create_table=true
        --oms.auth.openapi.enable=false
    ports:
      - "${POWERJOB_SERVER_HTTP_PORT:-7700}:7700"
      - "${POWERJOB_SERVER_AKKA_PORT:-10086}:10086"
      - "${POWERJOB_SERVER_TRANSPORT_HTTP_PORT:-10010}:10010"
      - "${POWERJOB_SERVER_MU_PORT:-10077}:10077"
    volumes:
      - powerjob-server-data:/root/powerjob
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:7700/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

volumes:
  powerjob-mysql-data:
  powerjob-server-data:
