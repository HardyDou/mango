# Mango admin micro frontend production example.
#
# Domains:
# - admin.mango.io serves the shell and proxies business API traffic.
# - rbac.mango.io serves the RBAC child app.
# - workflow.mango.io serves the Workflow child app.
#
# Build output example:
# - /srv/mango/admin-shell    <- apps/mango-admin-shell/dist
# - /srv/mango/admin-rbac     <- apps/mango-admin-rbac-app/dist
# - /srv/mango/admin-workflow <- apps/mango-admin-workflow-app/dist
#
# Keep runtime-config.json outside immutable assets so operations can switch
# monolith/hybrid/micro composition without rebuilding backend or frontend code.

map $http_origin $mango_micro_allowed_origin {
    default "";
    "https://admin.mango.io" $http_origin;
}

server {
    listen 443 ssl http2;
    server_name admin.mango.io;

    root /srv/mango/admin-shell;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://rbac.mango.io https://workflow.mango.io; style-src 'self' 'unsafe-inline' https://rbac.mango.io https://workflow.mango.io; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://rbac.mango.io https://workflow.mango.io; frame-src https://rbac.mango.io https://workflow.mango.io; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    location = /runtime-config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://mango-backend:18081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name rbac.mango.io;

    root /srv/mango/admin-rbac;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Access-Control-Allow-Origin $mango_micro_allowed_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    add_header Vary "Origin" always;

    if ($mango_micro_allowed_origin = "") {
        return 403;
    }

    if ($request_method = OPTIONS) {
        return 204;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name workflow.mango.io;

    root /srv/mango/admin-workflow;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Access-Control-Allow-Origin $mango_micro_allowed_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    add_header Vary "Origin" always;

    if ($mango_micro_allowed_origin = "") {
        return 403;
    }

    if ($request_method = OPTIONS) {
        return 204;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
