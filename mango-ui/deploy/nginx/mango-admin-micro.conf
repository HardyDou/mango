# Mango admin micro frontend production example.
#
# Domains:
# - admin.mango.io serves the shell and proxies business API traffic.
# - rbac.mango.io serves the RBAC child app.
# - workflow.mango.io serves the Workflow child app.
#
# Build output example:
# - /srv/mango/admin-shell    <- apps/mango-admin-shell/dist
# - /srv/mango/admin-rbac     <- apps/mango-admin-rbac-app/dist
# - /srv/mango/admin-workflow <- apps/mango-admin-workflow-app/dist
#
# Keep runtime-config.json outside immutable assets so operations can switch
# monolith/hybrid/micro composition without rebuilding backend or frontend code.

map $http_origin $mango_micro_allowed_origin {
    default "";
    "https://admin.mango.io" $http_origin;
}

server {
    listen 443 ssl http2;
    server_name admin.mango.io;

    root /srv/mango/admin-shell;
    index index.html;

    location = /runtime-config.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://mango-backend:18081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name rbac.mango.io;

    root /srv/mango/admin-rbac;
    index index.html;

    add_header Access-Control-Allow-Origin $mango_micro_allowed_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Vary "Origin" always;

    if ($mango_micro_allowed_origin = "") {
        return 403;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    server_name workflow.mango.io;

    root /srv/mango/admin-workflow;
    index index.html;

    add_header Access-Control-Allow-Origin $mango_micro_allowed_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Vary "Origin" always;

    if ($mango_micro_allowed_origin = "") {
        return 403;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
